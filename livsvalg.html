      padding: 20px;
      text-align: center;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
    }
    h1 {
      color: #2c3e50;
      margin-bottom: 30px;
    }
    .knapp-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 30px;
    }
    button {
      padding: 15px 20px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    button:not(:disabled) {
      background: linear-gradient(45deg, #4CAF50, #45a049);
      color: white;
    }
    button:not(:disabled):hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    }
    button:disabled {
      background: #bdc3c7;
      color: #7f8c8d;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    #output {
      background: white;
      margin-top: 30px;
      min-height: 80px;
      border-radius: 15px;
      padding: 25px;
      font-size: 20px;
      font-weight: 600;
      color: #2c3e50;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
      border-left: 5px solid #3498db;
    }
    .instruksjon {
      background: rgba(255,255,255,0.8);
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      color: #34495e;
    }
  </style>
</head>
