<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Livssimulator 2026</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
      text-align: center;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
    }
    h1 {
      color: #2c3e50;
      margin-bottom: 30px;
    }
    .knapp-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 30px;
    }
    button {
      padding: 15px 20px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    button:not(:disabled) {
      background: linear-gradient(45deg, #4CAF50, #45a049);
      color: white;
    }
    button:not(:disabled):hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    }
    button:disabled {
      background: #bdc3c7;
      color: #7f8c8d;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    #output {
      background: white;
      margin-top: 30px;
      min-height: 80px;
      border-radius: 15px;
      padding: 25px;
      font-size: 20px;
      font-weight: 600;
      color: #2c3e50;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
      border-left: 5px solid #3498db;
    }
    .instruksjon {
      background: rgba(255,255,255,0.8);
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      color: #34495e;
    }
  </style>
</head>
<body>
  <h1>🎲 Livssimulator 2026</h1>
  
  <div class="instruksjon">
    Trykk på én knapp om gangen. Hver knapp kan bare brukes én gang.
  </div>

  <div class="knapp-container">
    <button id="btn1">🏢 VELG ARBEIDSSITUASJON</button>
    <button id="btn2">🎰 LIVETS LOTTERI</button>
    <button id="btn3">⚠️ UFORUTSETT UTGIFT</button>
    <button id="btn4">💸 LITE GJENNOMTENKT UTGIFT</button>
  </div>

  <div id="output">Trykk på en knapp for å starte livet ditt...</div>

  <script>
    const output = document.getElementById('output');

    // Knapp 1: ARBEIDSSITUASJONER (50+ alternativer)
    const arbeidssituasjoner = [

      'Du blir IT-support i et lite firma.',

      'Du blir kokk på en lokal restaurant.',
      'Du blir servitør på hipsterkafé.',
      'Du jobber som reporter i lokalavisa.',
      'Du blir grafisk designer i reklamebyrå.',
      'Du blir bankrådgiver i SpareBank 1.',
      'Du starter egen neglelakeringssalong.',
      'Du driver dropshipping-nettbutikk.',
      'Du blir daglig leder i Røde Kors.',
      'Du jobber som renovasjonsarbeider.',
      'Du blir sivilingeniør i oljesektoren.',
      'Du jobber som elektriker på nybygg.',
      'Du blir rørlegger i VVS-firma.',
      'Du kjører varebil for Posten.',
      'Du blir bussjåfør på Ruter.',
      'Du jobber nattevakt på aldershjem.',
      'Du blir dosent ved NTNU.',
      'Du underviser som vikar på barneskole.',
      'Du blir yogalærer på SATS.',
      'Du jobber som PT på Elixia.',
      'Du blir fjordcruise-guide.',
      'Du jobber som resepsjonist på Thon Hotel.',
      'Du blir HR-assistent i Equinor.',
      'Du jobber med ESG-rapportering.',
      'Du blir melkebonde på familiebruk.',
      'Du jobber sesongfiske i Lofoten.',
      'Du blir gallerikunstner i Oslo.',
      'Du spiller fiolin i orkester.',
      'Du blir bibliotekar på Deichmanske.',
      'Du jobber som NAV-veileder.',
      'Du plukker varer på Ikea.',
      'Du reparerer biler på Bilia.',
      'Du blir securitas-vakt i butikk.',
      'Du står i kassa på H&M.',
      'Du blir barista på Espresso House.',
      'Du analyserer data i If Skadeforsikring.',
      'Du koder apper for Schibsted.',
      'Du oversetter tekster for Microsoft.',
      'Du fotograferer bryllup.',

      'Du blir psykolog.',
      'Du veileder elever på VGS.',
      'Du driver pizzabakeri.',
      'Du blir dykkeinstruktør.',
      'Du jobber i sykkelverksted.'
    ];

    // Knapp 2: LIVETS LOTTERI (50+ inntekter)
    const inntekter = [
      'Etter 2 år: Du vinner 28 000 kr i Eurojackpot.',
      'Etter 2 år: Du vinner 75 000 kr på jobblotteri.',
      'Etter 2 år: Du vinner 150 000 kr i bedriftslotteri.',
      'Etter 2 år: Du vinner 450 000 kr på Norsk Tipping.',
      'Etter 2 år: Du vinner 1 200 000 kr i Lotto.',
      'Etter 2 år: Du får 2,5% lønnsøkning.',
      'Etter 3 år: Du får 4% lønnsøkning.',
      'Hvert år: Du får 15 000 kr bonus.',
      'Hvert år: Du får 28 000 kr bonus.',
      'Hvert år: Du får 65 000 kr bonus.',
      'Bursdagsgave hvert år: 5000 kr.',
      'Julebonus hvert år: 6 800 kr.',
      'Første året: Arv fra tante: 95 000 kr.',
      'Første året: Arv fra besteforeldre: 350 000 kr.',
      'Første året: Arv fra besteforeldre: 2,1 mill. kr.',
      'Første året: Aksjeutbytte: +80.000.',
      'Hele perioden: Leieinntekt av sykkel: 1 000 kr. hver måned'
    ];

    // Knapp 3: UFORUTSETT UTGIFT (50+ alternativer)
    const uforutsetteUtgifter = [
      'En ferie koster 25 000. Du bruker forbrukslån med rente på 21% per år.',
      'Du reiser jorden rundt, 190 000. Du bruker forbrukslån med rente på 23% per år.',
      'En TV koster 45 000. Du bruker forbrukslån med rente på 14% per år.',
      'En ny mobil koster 18 000. Du bruker forbrukslån med rente på 24% per år.',
      'En TV koster 45 000. Du bruker forbrukslån med rente på 15% per år.',
      'Ny vaskemaskin: 8 000 kr. Du bruker forbrukslån med rente på 13% per år.',
      'Bilen din må på verksted 27 000 kr. Du bruker forbrukslån med rente på 19% per år.',
      'Ny vaskemaskin: 8 000 kr. Du bruker forbrukslån med rente på 32% per år.',
      'Reparasjon bad, 145 000. Du bruker forbrukslån med rente på 16% per år.'

    // Knapp 4: LITE GJENNOMTENKT (50+ alternativer)
    const dummeUtgifter = [
      'Kaffe og bolle på Baker Hansen hver dag i ett år',
      'PlayStation 5 impulskjøp: 7 200 kr.',
      'Dyr jakke: 10 000 kr.',
      'Gambler på nettet: 15 000 kr.'
    ];

    // Event listeners
    document.getElementById('btn1').addEventListener('click', function() {
      const idx = Math.floor(Math.random() * arbeidssituasjoner.length);
      output.textContent = arbeidssituasjoner[idx];
      this.disabled = true;
    });

    document.getElementById('btn2').addEventListener('click', function() {
      const idx = Math.floor(Math.random() * inntekter.length);
      output.textContent = inntekter[idx];
      this.disabled = true;
    });

    document.getElementById('btn3').addEventListener('click', function() {
      const idx = Math.floor(Math.random() * uforutsetteUtgifter.length);
      output.textContent = uforutsetteUtgifter[idx];
      this.disabled = true;
    });

    document.getElementById('btn4').addEventListener('click', function() {
      const idx = Math.floor(Math.random() * dummeUtgifter.length);
      output.textContent = dummeUtgifter[idx];
      this.disabled = true;
    });
  </script>
</body>
</html>
